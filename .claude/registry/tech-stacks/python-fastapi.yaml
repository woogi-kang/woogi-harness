schema_version: 1
id: python-fastapi
display_name: Python and FastAPI service baseline
verified_at: 2026-07-13
policy:
  default_channel: recommended
  upgrade_rule: Runtime, ASGI, validation, security, database, and test families move only with contract and integration evidence.
migration:
  guide: migrations/python314-fastapi139.md
  summary: Upgrade Python and FastAPI together while separating incompatible Redis client and broker dependency lanes and testing changed protocol behavior.
promotion_gates: &stack_gates
  - dependency-resolution
  - ruff
  - mypy
  - pytest
  - openapi-snapshot
  - asgi-lifespan
  - websocket-contract
  - database-migration
consumers: &stack_consumers
  - .claude/agents/💻 개발/fastapi-agent.md
  - .claude/skills/💻 개발/fastapi-agent-skills/1-project-setup/SKILL.md
  - .claude/skills/💻 개발/fastapi-agent-skills/36-service-layer/SKILL.md
  - .claude/skills/💻 개발/fastapi-agent-skills/21-file-upload/SKILL.md
  - .claude/skills/💻 개발/fastapi-agent-skills/24-scheduled-jobs/SKILL.md
  - .claude/skills/💻 개발/fastapi-agent-skills/29-integration-test/SKILL.md
  - .claude/skills/💻 개발/fastapi-agent-skills/35-email/SKILL.md
  - .claude/skills/💻 개발/fastapi-agent-skills/_references/TEST-PATTERN.md
  - .claude/skills/ui-styling/scripts/requirements.txt
  - .claude/skills/📝 콘텐츠/presentation-agent-skills/10-export-pptx/SKILL.md

