schema_version: 1
id: flutter
display_name: Flutter application baseline
verified_at: 2026-07-13
policy:
  default_channel: recommended
  upgrade_rule: Major SDK or package-family upgrades require generated-code, analyzer, test, and platform-build evidence.
migration:
  guide: migrations/flutter-3.24-to-3.44.md
  summary: Migrate the SDK and behavior-changing package families as one verified application baseline.
promotion_gates: &stack_gates
