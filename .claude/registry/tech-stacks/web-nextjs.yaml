schema_version: 1
id: web-nextjs
display_name: Next.js web application baseline
verified_at: 2026-07-13
policy:
  default_channel: recommended
  upgrade_rule: Current and prerelease channels are recorded but never replace the production baseline without compatibility evidence.
migration:
  guide: migrations/web-next16-typescript7.md
  summary: Keep Next.js 16 on Node LTS and promote TypeScript 7 only after compiler-API consumers are compatible.
promotion_gates: &stack_gates
  - package-resolution
  - next-typegen
  - typescript-check
  - eslint
  - unit-test
  - playwright
  - production-build
consumers: &stack_consumers
  - .claude/agents/💻 개발/figma-to-nextjs/shared/templates/security-guidelines.md
  - .claude/agents/💻 개발/flutter-to-nextjs.md
  - .claude/agents/💻 개발/nextjs-agent.md
  - .claude/skills/💻 개발/flutter-to-nextjs-skills/2-mapping/SKILL.md
  - .claude/skills/💻 개발/flutter-to-nextjs-skills/6-routing/SKILL.md
  - .claude/skills/💻 개발/nextjs-agent-skills/1-project-setup/SKILL.md
  - .claude/skills/💻 개발/nextjs-agent-skills/27-monorepo/SKILL.md
  - .claude/skills/💻 개발/nextjs-agent-skills/_references/NEXT16-ZUSTAND5-UPDATE.md
  - .claude/skills/💻 개발/nextjs-boilerplate-skill/SKILL.md
  - .claude/skills/💻 개발/nextjs-boilerplate-skill/templates/base/package.json.template
  - .claude/skills/💻 개발/nextjs-boilerplate-skill/templates/base/postcss.config.mjs.template
  - .claude/skills/💻 개발/nextjs-boilerplate-skill/templates/testing/package.json.additions.template
  - .claude/skills/💻 개발/nextjs-boilerplate-skill/templates/drizzle/package.json.additions.template
  - .claude/skills/💻 개발/nextjs-agent-skills/7-i18n/SKILL.md
  - .claude/skills/💻 개발/nextjs-agent-skills/20-unit-test/SKILL.md
  - .claude/skills/💻 개발/nextjs-agent-skills/29-email/SKILL.md
